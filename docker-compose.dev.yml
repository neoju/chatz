services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_dev:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data

  backend:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    entrypoint: ["sh", "-c"]
    command: ["corepack enable && corepack prepare pnpm@10.33.2 --activate && pnpm install --frozen-lockfile && pnpm --filter backend dev"]
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: "3000"
      CI: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
      - backend_app_node_modules:/app/apps/backend/node_modules
    depends_on:
      - mongo
      - redis

  frontend:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    entrypoint: ["sh", "-c"]
    command: ["corepack enable && corepack prepare pnpm@10.33.2 --activate && pnpm install --frozen-lockfile && pnpm --filter frontend dev"]
    environment:
      NODE_ENV: development
      CI: "true"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
      - frontend_app_node_modules:/app/apps/frontend/node_modules
    depends_on:
      - backend

volumes:
  mongo_data_dev:
  redis_data_dev:
  backend_node_modules:
  backend_app_node_modules:
  frontend_node_modules:
  frontend_app_node_modules:
